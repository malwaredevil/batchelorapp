version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/artifacts/api-server"
      - "/artifacts/elaine"
      - "/artifacts/modules"
      - "/artifacts/web"
      - "/lib/api-client-react"
      - "/lib/api-spec"
      - "/lib/api-zod"
      - "/lib/db"
      - "/lib/elaine-ui"
      - "/lib/gmail-ui"
      - "/lib/image-capture"
      - "/lib/messenger-ui"
      - "/lib/travels-settings-ui"
      - "/lib/ui"
      - "/lib/vite-config"
      - "/lib/web-core"
      - "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    rebase-strategy: "auto"
    groups:
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    rebase-strategy: "auto"
