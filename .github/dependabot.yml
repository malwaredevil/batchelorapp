version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/artifacts/api-server"
      - "/artifacts/mockup-sandbox"
      - "/lib/api-client-react"
      - "/lib/api-spec"
      - "/lib/api-zod"
      - "/lib/db"
      - "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    rebase-strategy: "auto"
    groups:
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    rebase-strategy: "auto"
