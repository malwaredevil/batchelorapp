# GitHub secret scanning path exclusions
#
# GitHub secret scanning (enabled for this public repo) scans committed code for
# known credential patterns. This file reduces false-positive noise by excluding
# paths that contain test fixtures, generated output, or public open-source
# package metadata — none of which would contain real household credentials.
#
# NOTE: push protection is also enabled on this repo, which means GitHub will
# block a push (with a UI bypass option) whenever a known-pattern secret is
# detected in the diff — before it can land on main. This is configured in
# the repository Security settings and does not require a file here.
#
# Custom patterns (e.g. for household email-domain PII) require GitHub Advanced
# Security, which is not available on this repo's current plan. The CI pii-scan
# job (scripts/src/pii-scan.ts) provides equivalent coverage on every push and
# every PR, catching email addresses outside the SAFE_DOMAINS allowlist.
# See .github/workflows/ci.yml (pii-scan job) for details.

paths-ignore:
  # pnpm lockfile — contains open-source contributor emails from package.json
  # metadata (public contributor info, not household PII)
  - "pnpm-lock.yaml"
  # Build output — never committed, but excluded as a belt-and-suspenders measure
  - "artifacts/*/dist/**"
  - "dist/**"
  # Test coverage reports
  - "coverage/**"
  # Dev test fixtures — internal test helpers not shipped to production;
  # may contain synthetic example values that look like credentials
  - "scripts/test-fixtures/**"
  # Playwright failure reports (uploaded as CI artifacts, not committed)
  - "artifacts/e2e/playwright-report*/**"
  # pnpm virtual store and cache (Replit-specific, never committed)
  - ".pnpm-store/**"
  - ".cache/**"
