name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build-api:
    name: Build API server
    needs: [typecheck]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run build

  build-modules:
    name: Build modules frontend
    needs: [typecheck]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PORT: "3001"
      BASE_PATH: "/modules/"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/modules run build

  build-web:
    name: Build web frontend
    needs: [typecheck]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PORT: "3002"
      BASE_PATH: "/"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/web run build

  build-elaine:
    name: Build elaine frontend
    needs: [typecheck]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PORT: "3003"
      BASE_PATH: "/elaine/"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/elaine run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  app-config-drift:
    name: App-config drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run lint:config

  test-api-server:
    name: API server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run test

  codegen-drift:
    name: Codegen drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-spec run codegen
      - name: Fail if codegen produced a diff
        run: |
          if ! git diff --quiet; then
            echo "Generated API types/spec are out of date. Run 'pnpm --filter @workspace/api-spec run codegen' locally and commit the result."
            git --no-pager diff --stat
            exit 1
          fi

  e2e-critical:
    name: E2E critical-path (Chromium)
    needs: [typecheck]
    runs-on: ubuntu-latest
    env:
      PORT: "4173"
      BASE_PATH: "/"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @workspace/e2e exec playwright install chromium --with-deps
      - name: Build web artifact
        run: pnpm --filter @workspace/web run build
      - name: Run critical-path E2E tests
        run: pnpm --filter @workspace/e2e run test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.run_id }}
          path: artifacts/e2e/playwright-report/
          retention-days: 7
