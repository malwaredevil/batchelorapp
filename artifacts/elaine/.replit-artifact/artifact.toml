kind = "web"
previewPath = "/elaine/"
title = "Elaine"
version = "1.0.0"
id = "artifacts/elaine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/elaine/" ]
localPort = 25669

[services.development]
run = "pnpm --filter @workspace/elaine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elaine", "run", "build" ]
publicDir = "artifacts/elaine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25669"
BASE_PATH = "/elaine/"
