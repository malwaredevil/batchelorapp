  <body>
    <script>
      // Apply persisted theme before React mounts to avoid a light->dark flash.
      try {
        if (localStorage.getItem("batchelor-theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
