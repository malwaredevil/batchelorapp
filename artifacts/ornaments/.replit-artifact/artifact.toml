kind = "web"
previewPath = "/ornaments/"
title = "Ornaments"
version = "1.0.0"
id = "artifacts/ornaments"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ornaments/" ]
localPort = 23184

[services.development]
run = "pnpm --filter @workspace/ornaments run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ornaments", "run", "build" ]
publicDir = "artifacts/ornaments/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23184"
BASE_PATH = "/ornaments/"
