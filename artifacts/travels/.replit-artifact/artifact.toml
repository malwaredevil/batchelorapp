kind = "web"
previewPath = "/travels/"
title = "Travels"
version = "1.0.0"
id = "artifacts/travels"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/travels/" ]
localPort = 20004

[services.development]
run = "pnpm --filter @workspace/travels run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travels", "run", "build" ]
publicDir = "artifacts/travels/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20004"
BASE_PATH = "/travels/"
