<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Batchelor — Pottery, Quilting &amp; Travel Collections</title>
    <meta
      name="description"
      content="Batchelor is John and Ashley's private home for their pottery, quilting, and travel collections — one account for cataloguing pieces, fabrics, patterns, and trips with AI-assisted search and organization."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:site_name" content="Batchelor" />
    <meta
      property="og:title"
      content="Batchelor — Pottery, Quilting &amp; Travel Collections"
    />
    <meta
      property="og:description"
      content="One account, every collection. Catalogue and search pottery, quilting fabrics/patterns, and travel plans in one shared app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.batchelor.app" />
    <meta
      property="og:image"
      content="https://app.batchelor.app/opengraph.jpg"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Batchelor — Pottery, Quilting &amp; Travel Collections"
    />
    <meta
      name="twitter:description"
      content="One account, every collection. Catalogue and search pottery, quilting fabrics/patterns, and travel plans in one shared app."
    />
    <meta
      name="twitter:image"
      content="https://app.batchelor.app/opengraph.jpg"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Apply persisted theme before React mounts to avoid a light->dark flash.
      try {
        if (localStorage.getItem("batchelor-theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
