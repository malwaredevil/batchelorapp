<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="elaineBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#elaineBg)" />
  <rect width="800" height="400" fill="url(#glow)" />

  <!-- Soft orbiting dots suggesting AI / constellation -->
  <circle cx="120" cy="90" r="2" fill="#e0e7ff" opacity="0.6" />
  <circle cx="220" cy="60" r="1.5" fill="#e0e7ff" opacity="0.5" />
  <circle cx="620" cy="70" r="2" fill="#e0e7ff" opacity="0.6" />
  <circle cx="700" cy="120" r="1.5" fill="#e0e7ff" opacity="0.5" />
  <circle cx="670" cy="310" r="1.5" fill="#e0e7ff" opacity="0.4" />
  <circle cx="100" cy="320" r="2" fill="#e0e7ff" opacity="0.4" />

  <!-- Connection lines -->
  <path d="M120 90 L220 60 M620 70 L700 120 M670 310 L620 260" stroke="#e0e7ff" stroke-width="1" opacity="0.25" />

  <!-- Central sparkle / assistant motif -->
  <g transform="translate(400, 190)">
    <path d="M0 -70 L16 -16 L70 0 L16 16 L0 70 L-16 16 L-70 0 L-16 -16 Z"
      fill="#f5f3ff" opacity="0.95" />
    <path d="M0 -34 L8 -8 L34 0 L8 8 L0 34 L-8 8 L-34 0 L-8 -8 Z"
      fill="#a78bfa" opacity="0.9" />
    <circle cx="0" cy="0" r="9" fill="#ede9fe" />
  </g>

  <!-- Small secondary sparkles -->
  <g transform="translate(560, 260)">
    <path d="M0 -18 L4 -4 L18 0 L4 4 L0 18 L-4 4 L-18 0 L-4 -4 Z" fill="#f5f3ff" opacity="0.8" />
  </g>
  <g transform="translate(250, 300)">
    <path d="M0 -14 L3 -3 L14 0 L3 3 L0 14 L-3 3 L-14 0 L-3 -3 Z" fill="#f5f3ff" opacity="0.7" />
  </g>
</svg>
