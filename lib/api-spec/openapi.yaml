      properties:
        id:
          type: integer
        name:
          type: string
        bgColor:
          type: string
          nullable: true
        textColor:
          type: string
          nullable: true
        count:
          type: integer
          description: Number of pieces assigned this category (only present on the category-list endpoint)
    PotteryCategoryInput:
      type: object
