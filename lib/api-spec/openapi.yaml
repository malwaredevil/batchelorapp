        - $ref: "#/components/parameters/IdParam"
        - in: query
          name: size
          schema:
            type: integer
            minimum: 50
            maximum: 800
            default: 300
          description: Width of the PNG in pixels (height is derived from the block's aspect ratio).
      responses:
        "200":
          description: PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "304":
          description: Not Modified (ETag matched)
        "404":
          description: Block not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
