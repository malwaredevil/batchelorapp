        - operations
      summary: List sanitized external operation events (owner only)
      parameters:
        - name: provider
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 250
      responses:
        "200":
          description: Operation events
          content:
