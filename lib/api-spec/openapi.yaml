  /notifications/counts:
    get:
      operationId: getCounts
      tags:
        - notifications
      summary: Get unread notification counts for the current user
      responses:
        "200":
          description: Notification counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsCountsResponse"
  /notifications:
    get:
      operationId: list
      tags:
        - notifications
      summary: List notifications for the current user
      parameters:
        - in: query
          name: module
          schema:
            type: string
          description: Filter by module (pottery, quilting, travels, ornaments, hub, etc.)
        - in: query
          name: severity
          schema:
            type: string
            enum:
              - informational
              - attention
              - important
              - critical
          description: Filter by minimum severity
        - in: query
          name: unread
          schema:
            type: boolean
          description: If true, return only unread notifications
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        "200":
          description: Paginated notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
  /notifications/bulk-state:
    post:
      operationId: bulkUpdateState
      tags:
        - notifications
      summary: Bulk-update read/dismiss state for multiple notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationsBulkStateBody"
      responses:
        "200":
          description: Number of updated recipients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsBulkStateResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /notifications/preferences:
    get:
      operationId: getNotificationsPreferences
      tags:
        - notifications
      summary: Get notification preferences for the current user
      responses:
        "200":
          description: User notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsPreferencesResponse"
    put:
      operationId: updateNotificationsPreferences
      tags:
        - notifications
      summary: Update notification preferences for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationsPreferencesBody"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsPreferencesResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /notifications/{recipientId}:
    patch:
      operationId: updateState
      tags:
        - notifications
      summary: Update read/ack/dismiss/snooze state for a single notification
      parameters:
        - in: path
          name: recipientId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationsUpdateStateBody"
      responses:
        "200":
          description: Updated recipient state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsRecipientState"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
        configBootstrap:
          type: string
          enum:
            - pending
            - success
            - warn
            - error
          description: |
            Outcome of the last app-config bootstrap run. "pending" = not yet run; "success" = all steps completed; "warn" = DB unavailable at startup (non-fatal, using hardcoded fallbacks); "error" = unexpected JS error, stale/missing config rows may persist.
        migrations:
          type: object
          nullable: true
          required:
            - expectedLatestVersion
            - appliedLatestVersion
            - pendingCount
            - checksumErrorCount
          properties:
            expectedLatestVersion:
              type: integer
            appliedLatestVersion:
              type: integer
              nullable: true
            pendingCount:
              type: integer
            checksumErrorCount:
              type: integer
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean
    AuthUser:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
          nullable: true
        themePreference:
          type: string
          enum:
            - light
            - dark
          nullable: true
        isOwner:
          type: boolean
        phoneNumber:
          type: string
          nullable: true
        phoneVerified:
          type: boolean
        birthday:
          type: string
          nullable: true
          description: Birthday as MM-DD (e.g. 03-15 for March 15th). Year is omitted.
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    UpdateAccountInput:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
        themePreference:
          type: string
          enum:
            - light
            - dark
          nullable: true
        birthday:
          type: string
          nullable: true
          description: Birthday as MM-DD (e.g. 03-15 for March 15th). Year is omitted.
    AuthProviders:
      type: object
      required:
        - google
      properties:
        google:
          type: boolean
    ForgotPasswordInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    ResetPasswordInput:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string
    SendPhoneCodeInput:
      type: object
      required:
        - phoneNumber
        - consent
      properties:
        phoneNumber:
          type: string
          description: E.164 format, e.g. "+12105551234"
        consent:
          type: boolean
          description: Must be true. Explicit opt-in confirmation that the user agreed to receive SMS text messages (verification codes and Travels reminders) at this number. Required for A2P 10DLC compliance — requests without consent=true are rejected.
    VerifyPhoneCodeInput:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
    ChangePasswordInput:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    PotteryStragglerItem:
      type: object
      required:
        - id
        - reasons
      properties:
        id:
          type: integer
        reasons:
          type: array
          description: Why this piece needs re-analysis. "embedding" = no similarity vector (excluded from compare); "attributes" = no descriptive fields were extracted.
          items:
            type: string
            enum:
              - embedding
              - attributes
    PotteryStragglers:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PotteryStragglerItem"
    PotteryMessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    PotteryCategory:
      type: object
      required:
        - id
