openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Unified API specification (pottery + quilting + travels)
servers:
  - url: /api
    description: Base API path
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - auth
      summary: Log out
      responses:
        "200":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
    patch:
      operationId: updateCurrentUser
      tags:
        - auth
      summary: Update the current user's account settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
  /auth/providers:
    get:
      operationId: getAuthProviders
      tags:
        - auth
      summary: Get available login providers
      responses:
        "200":
          description: Available providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviders"
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags:
        - auth
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "204":
          description: |
            Reset email sent (or silently accepted when email is not registered, to avoid account enumeration)
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Email service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags:
        - auth
      summary: Consume a reset token and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "204":
          description: Password updated
        "400":
          description: Token invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/change-password:
    post:
      operationId: changePassword
      tags:
        - auth
      summary: Change password for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "204":
          description: Password changed
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Current password incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/items:
    get:
      operationId: listPottery
      tags:
        - pottery
      summary: List pottery
      responses:
        "200":
          description: Collection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PotteryPotteryItem"
    post:
      operationId: createPottery
      tags:
        - pottery
      summary: Add a pottery piece
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryItem"
        "400":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/items/stragglers:
    get:
      operationId: getStragglers
      tags:
        - pottery
      summary: List pieces missing an embedding or core attributes
      description: 'Returns pieces that need re-analysis: those with no similarity embedding (invisible to the "Do I own this?" compare) or with no descriptive attributes at all. Used by the Maintenance page to offer a one-click targeted re-analysis.'
      responses:
        "200":
          description: Stragglers needing re-analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryStragglers"
  /pottery/items/{id}:
    get:
      operationId: getPottery
      tags:
        - pottery
      summary: Get a pottery piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The pottery piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updatePottery
      tags:
        - pottery
      summary: Update a pottery piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryPotteryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePottery
      tags:
        - pottery
      summary: Remove a pottery piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/items/{id}/images:
    post:
      operationId: addPotteryImage
      tags:
        - pottery
      summary: Add a supplemental image to a piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryImage"
        "400":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Piece not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/items/{id}/images/{imageId}:
    patch:
      operationId: updatePotteryImage
      tags:
        - pottery
      summary: Update a supplemental image's label or position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryPotteryImageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryImage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePotteryImage
      tags:
        - pottery
      summary: Remove a supplemental image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/items/{id}/reanalyze:
    post:
      operationId: reanalyzePottery
      tags:
        - pottery
      summary: Re-run AI analysis on a pottery piece
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated with fresh AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/items/items/bulk-reanalyze:
    post:
      operationId: bulkReanalyzePottery
      tags:
        - pottery
      summary: Re-run AI analysis on multiple pottery pieces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryPotteryBulkReanalyzeInput"
      responses:
        "200":
          description: Bulk reanalysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryBulkReanalyzeResult"
  /pottery/items/{id}/set-primary-image:
    post:
      operationId: setPrimaryImage
      tags:
        - pottery
      summary: Promote a supplemental image to primary and re-analyse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryPrimaryImageSelection"
      responses:
        "200":
          description: Updated item with new primary image and fresh AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryPotteryItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/categories:
    get:
      operationId: listPotteryCategories
      tags:
        - pottery
      summary: List categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PotteryCategory"
    post:
      operationId: createPotteryCategory
      tags:
        - pottery
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryCategory"
        "409":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/categories/unused:
    delete:
      operationId: deletePotteryUnusedCategories
      tags:
        - pottery
      summary: Delete all categories that have no pieces assigned
      responses:
        "200":
          description: Number of categories deleted
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                properties:
                  deleted:
                    type: integer
  /pottery/categories/{id}:
    patch:
      operationId: renamePotteryCategory
      tags:
        - pottery
      summary: Rename a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryCategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryCategory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePotteryCategory
      tags:
        - pottery
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/categories/{id}/colors:
    put:
      operationId: updatePotteryCategoryColors
      tags:
        - pottery
      summary: Update a category's background and text colours
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryCategoryColorInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryCategory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/categories/{id}/merge:
    post:
      operationId: mergePotteryCategory
      tags:
        - pottery
      summary: Merge a category into another (reassigns all pieces, deletes source)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PotteryMergeCategoryInput"
      responses:
        "204":
          description: Merged and deleted
        "400":
          description: Cannot merge a category into itself
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Source or target not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/compare:
    post:
      operationId: comparePottery
      tags:
        - compare
      summary: Compare a candidate photo against the collection
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryCompareResult"
        "400":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /pottery/stats:
    get:
      operationId: getCollectionStats
      tags:
        - stats
      summary: Collection statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PotteryCollectionStats"
  /quilting/fabrics:
    get:
      operationId: listFabrics
      tags:
        - fabrics
      summary: List all fabrics
      responses:
        "200":
          description: Fabric list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuiltingFabric"
    post:
      operationId: createFabric
      tags:
        - fabrics
      summary: Add a fabric (with primary photo)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/QuiltingCreateFabricInput"
      responses:
        "201":
          description: Fabric created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingFabric"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /quilting/fabrics/{id}:
    get:
      operationId: getFabric
      tags:
        - fabrics
      summary: Get a fabric by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Fabric detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingFabric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateFabric
      tags:
        - fabrics
      summary: Update fabric metadata
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuiltingUpdateFabricInput"
      responses:
        "200":
          description: Updated fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingFabric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteFabric
      tags:
        - fabrics
      summary: Delete a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
  /quilting/fabrics/{id}/image:
    get:
      operationId: getFabricImage
      tags:
        - fabrics
      summary: Get primary fabric image (proxied, authenticated)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Image binary
  /quilting/fabrics/{id}/reanalyze:
    post:
      operationId: reanalyzeFabric
      tags:
        - fabrics
      summary: Re-run AI analysis on a fabric using its existing photos
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingFabric"
  /quilting/fabrics/bulk-reanalyze:
    post:
      operationId: bulkReanalyzeFabrics
      tags:
        - fabrics
      summary: Re-run AI analysis on multiple fabrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuiltingBulkReanalyzeInput"
      responses:
        "200":
          description: Bulk reanalysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingBulkReanalyzeResult"
  /quilting/fabrics/{id}/images:
    post:
      operationId: addFabricImage
      tags:
        - fabrics
      summary: Add a supplemental image to a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/QuiltingAddImageInput"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingEntityImage"
  /quilting/fabrics/{id}/images/{imageId}:
    get:
      operationId: getFabricSupplementalImage
      tags:
        - fabrics
      summary: Get a supplemental fabric image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "200":
          description: Image binary
    patch:
      operationId: updateFabricImage
      tags:
        - fabrics
      summary: Update a supplemental fabric image label/position
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuiltingUpdateImageInput"
      responses:
        "200":
          description: Updated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingEntityImage"
    delete:
      operationId: deleteFabricImage
      tags:
        - fabrics
      summary: Delete a supplemental fabric image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "204":
          description: Deleted
  /quilting/patterns:
    get:
      operationId: listPatterns
      tags:
        - patterns
      summary: List all quilt patterns
      responses:
        "200":
          description: Pattern list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuiltingQuiltPattern"
    post:
      operationId: createPattern
      tags:
        - patterns
      summary: Add a quilt pattern
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/QuiltingCreatePatternInput"
      responses:
        "201":
          description: Pattern created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingQuiltPattern"
  /quilting/patterns/{id}:
    get:
      operationId: getPattern
      tags:
        - patterns
      summary: Get a quilt pattern by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Pattern detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingQuiltPattern"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updatePattern
      tags:
        - patterns
      summary: Update pattern metadata
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuiltingUpdatePatternInput"
      responses:
        "200":
          description: Updated pattern
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingQuiltPattern"
    delete:
      operationId: deletePattern
      tags:
        - patterns
      summary: Delete a pattern
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
  /quilting/patterns/{id}/image:
    get:
      operationId: getPatternImage
      tags:
        - patterns
      summary: Get primary pattern image
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Image binary
  /quilting/patterns/{id}/reanalyze:
    post:
      operationId: reanalyzePattern
      tags:
        - patterns
      summary: Re-run AI analysis on a pattern using its existing photo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated pattern
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingQuiltPattern"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /quilting/patterns/{id}/enrich:
    post:
      operationId: enrichPattern
      tags:
        - patterns
      summary: Enrich designer metadata via AI web search (Perplexity)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated pattern with enriched designer info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingQuiltPattern"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /quilting/patterns/{id}/extract-blocks:
    post:
      operationId: extractPatternBlocks
      tags:
        - patterns
      summary: Extract block grid schema from pattern image via AI
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Extracted block schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltingExtractBlocksResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Pattern has no image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /quilting/patterns/bulk-reanalyze:
    post:
