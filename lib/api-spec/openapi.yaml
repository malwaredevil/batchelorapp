          type: boolean
          description: True when this DB row has no matching APP_CONFIG_DEFAULTS entry (e.g. after a key rename). The label/description shown may be stale.
        type:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
    ConfigAppConfigListResponse:
      type: object
      required:
        - config
      properties:
        config:
          type: array
          items:
            $ref: "#/components/schemas/ConfigAppConfigRow"
        bootstrappedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent server startup bootstrap/prune run. Null if the server has not yet bootstrapped (very rare). Advances on every restart so the admin UI can detect staleness.
        bootstrapStatus:
          type: string
          enum:
            - pending
            - success
            - warn
            - error
          nullable: true
          description: Outcome of the most recent bootstrapDefaults() run. "warn" means the server started without DB access and is running on hardcoded fallbacks; config rows may not be seeded yet. Null when the status is not yet known (pre-first-fetch).
        bootstrapRetryAt:
          type: string
          format: date-time
          nullable: true
          description: Scheduled time of the next automatic bootstrapDefaults() retry. Only present (non-null) when bootstrapStatus is "warn". Null otherwise.
