                $ref: "#/components/schemas/OperationsOperationBudgetsResponse"
  /operations/budgets/{id}:
    put:
      operationId: updateOperationBudget
      tags:
        - operations
      summary: Update a budget policy (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperationsUpdateBudgetBody"
      responses:
        "200":
