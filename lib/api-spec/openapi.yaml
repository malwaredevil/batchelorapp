components:
  schemas:
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean
    AuthUser:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
          nullable: true
        themePreference:
          type: string
          enum:
            - light
            - dark
          nullable: true
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    UpdateAccountInput:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
        themePreference:
          type: string
          enum:
            - light
            - dark
          nullable: true
    AuthProviders:
      type: object
      required:
        - google
      properties:
        google:
          type: boolean
    ForgotPasswordInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    ResetPasswordInput:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
        newPassword:
          type: string
    ChangePasswordInput:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    PotteryStragglerItem:
      type: object
      required:
        - id
        - reasons
      properties:
        id:
          type: integer
        reasons:
          type: array
          description: Why this piece needs re-analysis. "embedding" = no similarity vector (excluded from compare); "attributes" = no descriptive fields were extracted.
          items:
            type: string
            enum:
              - embedding
              - attributes
    PotteryStragglers:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PotteryStragglerItem"
