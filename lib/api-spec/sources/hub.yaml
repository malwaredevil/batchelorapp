openapi: 3.1.0
info:
  title: Hub
  version: 0.1.0
paths:
  /preferences:
    get:
      operationId: getPreferences
      tags:
        - hub
      summary: Get the current user's hub dashboard widget layout
      responses:
        "200":
          description: Widget slot preferences (null if never saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updatePreferences
      tags:
        - hub
      summary: Save the current user's hub dashboard widget layout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferencesBody"
      responses:
        "200":
          description: Saved widget slot preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /weather-config:
    get:
      operationId: getWeatherConfig
      tags:
        - hub
      summary: Get the current user's saved weather widget location/unit
      responses:
        "200":
          description: Weather config (null if never saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherConfigResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateWeatherConfig
      tags:
        - hub
      summary: Save the current user's weather widget location/unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherConfigBody"
      responses:
        "200":
          description: Saved weather config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherConfigResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    WidgetSlot:
      description: >-
        A static catalogue widget slot ({t:"s",id}) or a configurable RSS
        instance slot ({t:"r",iid,title,url}). Union validated client-side;
        represented loosely here since Zod uses a discriminated union that
        Orval renders as a plain object.
      type: object
      required:
        - t
      properties:
        t:
          type: string
          enum: ["s", "r"]
        id:
          type: string
        iid:
          type: string
        title:
          type: string
        url:
          type: string
    PreferencesBody:
      type: object
      required:
        - slots
      properties:
        slots:
          type: array
          maxItems: 60
          items:
            $ref: "#/components/schemas/WidgetSlot"
    PreferencesResponse:
      type: object
      required:
        - slots
      properties:
        slots:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/WidgetSlot"
    WeatherConfigBody:
      type: object
      required:
        - city
        - country
        - lat
        - lon
        - unit
      properties:
        city:
          type: string
          maxLength: 200
        country:
          type: string
          maxLength: 100
        lat:
          type: number
          minimum: -90
          maximum: 90
        lon:
          type: number
          minimum: -180
          maximum: 180
        unit:
          type: string
          enum: ["celsius", "fahrenheit"]
    WeatherConfigResponse:
      type: object
      required:
        - config
      properties:
        config:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WeatherConfigBody"
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
