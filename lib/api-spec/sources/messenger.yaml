openapi: 3.1.0
info:
  title: Messenger
  version: 0.1.0
paths:
  /conversations:
    get:
      operationId: listConversations
      tags:
        - messenger
      summary: List all household conversations with unread counts
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createConversation
      tags:
        - messenger
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
  /conversations/unread-count:
    get:
      operationId: getUnreadCount
      tags:
        - messenger
      summary: Total unread message count (for badge)
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
  /conversations/{id}:
    patch:
      operationId: updateConversation
      tags:
        - messenger
      summary: Rename or archive/unarchive a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationBody"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
        "404":
          description: Not found
    delete:
      operationId: deleteConversation
      tags:
        - messenger
      summary: Permanently delete a conversation and all its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags:
        - messenger
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: since
          in: query
          schema:
            type: string
          description: ISO timestamp — return only messages created after this time
        - name: before
          in: query
          schema:
            type: string
          description: ISO timestamp — paginate backward before this time
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessengerMessage"
    post:
      operationId: sendMessage
      tags:
        - messenger
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessengerMessage"
    delete:
      operationId: clearConversation
      tags:
        - messenger
      summary: Clear all messages in a conversation (soft-deletes everything, keeps the conversation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cleared
  /messages/{id}/read:
    post:
      operationId: markMessageRead
      tags:
        - messenger
      summary: Mark a message (and all prior in conversation) as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - markedCount
                properties:
                  markedCount:
                    type: integer
  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags:
        - messenger
      summary: Soft-delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: editMessage
      tags:
        - messenger
      summary: Edit the body of your own last message (only allowed if no later message exists)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditMessageResponse"
        "403":
          description: Not your message
        "409":
          description: A later message exists — edit not allowed
  /attachments/upload:
    post:
      operationId: uploadAttachment
      tags:
        - messenger
      summary: Upload a file attachment (returns storage info to include in sendMessage)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentUploadResult"
  /conversations/members:
    get:
      operationId: listHouseholdMembers
      tags:
        - messenger
      summary: List all household member accounts (for @mention and contacts panel)
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HouseholdMember"
  /link-preview:
    get:
      operationId: getLinkPreview
      tags:
        - messenger
      summary: Get cached OG link preview for a URL
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Link preview (fields may be null if unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkPreview"
components:
  schemas:
    ConversationSummary:
      type: object
      required:
        - id
        - createdAt
        - unreadCount
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastMessage:
          $ref: "#/components/schemas/MessengerMessage"
        unreadCount:
          type: integer
    CreateConversationBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    UpdateConversationBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
        archived:
          type: boolean
    MessengerMessage:
      type: object
      required:
        - id
        - conversationId
        - body
        - createdAt
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
          nullable: true
        senderName:
          type: string
          nullable: true
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        editedAt:
          type: string
          format: date-time
          nullable: true
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/MessengerAttachment"
    SendMessageBody:
      type: object
      required:
        - body
      properties:
        body:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentInput"
    MessengerAttachment:
      type: object
      required:
        - id
        - messageId
        - mimeType
        - fileName
        - url
      properties:
        id:
          type: integer
        messageId:
          type: integer
        mimeType:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
        url:
          type: string
    AttachmentInput:
      type: object
      required:
        - storagePath
        - mimeType
        - fileName
        - sizeBytes
      properties:
        storagePath:
          type: string
        mimeType:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
    AttachmentUploadResult:
      type: object
      required:
        - storagePath
        - url
        - mimeType
        - fileName
        - sizeBytes
      properties:
        storagePath:
          type: string
        url:
          type: string
        mimeType:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
    UnreadCountResponse:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
    HouseholdMember:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
        displayName:
          type: string
          nullable: true
        email:
          type: string
    EditMessageBody:
      type: object
      required:
        - body
      properties:
        body:
          type: string
    EditMessageResponse:
      type: object
      required:
        - id
        - editedAt
      properties:
        id:
          type: integer
        editedAt:
          type: string
          format: date-time
    LinkPreview:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
