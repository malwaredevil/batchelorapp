openapi: 3.1.0
info:
  title: Messenger
  version: 0.1.0
paths:
  /conversations:
    get:
      operationId: listConversations
      tags:
        - messenger
      summary: List conversations the current user participates in
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createConversation
      tags:
        - messenger
      summary: Create a new conversation (DM or group)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "200":
          description: Existing DM returned (when isDirect and DM already exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
  /conversations/unread-count:
    get:
      operationId: getUnreadCount
      tags:
        - messenger
      summary: Total unread message count across all participant conversations (for badge)
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
  /conversations/{id}:
    patch:
      operationId: updateConversation
      tags:
        - messenger
      summary: Rename or archive/unarchive a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationBody"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
        "403":
          description: Not a participant
        "404":
          description: Not found
    delete:
      operationId: deleteConversation
      tags:
        - messenger
      summary: Permanently delete a conversation and all its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags:
        - messenger
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: since
          in: query
          schema:
            type: string
        - name: before
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessengerMessage"
    post:
      operationId: sendMessage
      tags:
        - messenger
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessengerMessage"
    delete:
      operationId: clearConversation
      tags:
        - messenger
      summary: Clear all messages (soft-delete only, keeps conversation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cleared
  /messages/{id}/read:
    post:
      operationId: markMessageRead
      tags:
        - messenger
      summary: Mark a message (and all prior in conversation) as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - markedCount
                properties:
                  markedCount:
                    type: integer
  /messages/{id}/reactions:
    post:
      operationId: addReaction
      tags:
        - messenger
      summary: Add an emoji reaction to a message (idempotent)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReactionBody"
      responses:
        "204":
          description: Reaction added (or already existed)
  /messages/{id}/reactions/{emoji}:
    delete:
      operationId: removeReaction
      tags:
        - messenger
      summary: Remove your emoji reaction from a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: emoji
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags:
        - messenger
      summary: Soft-delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: editMessage
      tags:
        - messenger
      summary: Edit the body of your own last message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EditMessageResponse"
        "403":
          description: Not your message
        "409":
          description: A later message exists
  /attachments/upload:
    post:
      operationId: uploadAttachment
      tags:
        - messenger
      summary: Upload a file attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentUploadResult"
  /conversations/members:
    get:
      operationId: listHouseholdMembers
      tags:
        - messenger
      summary: List all household member accounts
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HouseholdMember"
  /push-subscribe:
    post:
      operationId: pushSubscribe
      tags:
        - messenger
      summary: Save (or update) a browser push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeBody"
      responses:
        "204":
          description: Saved
    delete:
      operationId: pushUnsubscribe
      tags:
        - messenger
      summary: Remove a browser push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnsubscribeBody"
      responses:
        "204":
          description: Removed
  /link-preview:
    get:
      operationId: getLinkPreview
      tags:
        - messenger
      summary: Get cached OG link preview for a URL
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Link preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkPreview"
components:
  schemas:
    ConversationParticipant:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        displayName:
          type: string
          nullable: true
    ConversationSummary:
      type: object
      required:
        - id
        - isDirect
        - createdAt
        - unreadCount
        - participants
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        isDirect:
          type: boolean
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastMessage:
          $ref: "#/components/schemas/MessengerMessage"
        unreadCount:
          type: integer
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ConversationParticipant"
    CreateConversationBody:
      type: object
      required:
        - participantIds
      properties:
        name:
          type: string
          nullable: true
        isDirect:
          type: boolean
        participantIds:
          type: array
          items:
            type: integer
    UpdateConversationBody:
      type: object
      properties:
        name:
          type: string
          nullable: true
        archived:
          type: boolean
    MessengerMessage:
      type: object
      required:
        - id
        - conversationId
        - body
        - createdAt
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
          nullable: true
        senderName:
          type: string
          nullable: true
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
        editedAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional structured data attached to the message (e.g. Elaine widget cards)
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/MessengerAttachment"
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/MessengerReaction"
    SendMessageBody:
      type: object
      required:
        - body
      properties:
        body:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentInput"
    MessengerAttachment:
      type: object
      required:
        - id
        - messageId
        - mimeType
        - fileName
        - url
      properties:
        id:
          type: integer
        messageId:
          type: integer
        mimeType:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
        url:
          type: string
    AttachmentInput:
      type: object
      required:
        - storagePath
        - mimeType
        - fileName
        - sizeBytes
      properties:
        storagePath:
          type: string
        mimeType:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
    AttachmentUploadResult:
      type: object
      required:
        - storagePath
        - url
        - mimeType
        - fileName
        - sizeBytes
      properties:
        storagePath:
          type: string
        url:
          type: string
        mimeType:
          type: string
        fileName:
          type: string
        sizeBytes:
          type: integer
    UnreadCountResponse:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
    HouseholdMember:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
        displayName:
          type: string
          nullable: true
        email:
          type: string
    EditMessageBody:
      type: object
      required:
        - body
      properties:
        body:
          type: string
    EditMessageResponse:
      type: object
      required:
        - id
        - editedAt
      properties:
        id:
          type: integer
        editedAt:
          type: string
          format: date-time
    LinkPreview:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
    PushSubscribeBody:
      type: object
      required:
        - endpoint
        - keys
      properties:
        endpoint:
          type: string
        keys:
          type: object
          required:
            - p256dh
            - auth
          properties:
            p256dh:
              type: string
            auth:
              type: string
    PushUnsubscribeBody:
      type: object
      required:
        - endpoint
      properties:
        endpoint:
          type: string
    MessengerReaction:
      type: object
      required:
        - emoji
        - count
        - userReacted
      properties:
        emoji:
          type: string
        count:
          type: integer
        userReacted:
          type: boolean
    AddReactionBody:
      type: object
      required:
        - emoji
      properties:
        emoji:
          type: string
