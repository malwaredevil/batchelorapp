openapi: 3.1.0
info:
  title: Office
  version: 0.1.0
paths:
  /notes:
    get:
      operationId: listNotes
      tags:
        - office
      summary: List all household notes
      responses:
        "200":
          description: Note list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags:
        - office
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
  /notes/{id}:
    patch:
      operationId: updateNote
      tags:
        - office
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteNote
      tags:
        - office
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Note:
      type: object
      required:
        - id
        - title
        - body
        - createdByUserId
        - createdByName
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        createdByUserId:
          type: integer
          nullable: true
        createdByName:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
    NoteInput:
      type: object
      required:
        - title
        - body
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          maxLength: 20000
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
