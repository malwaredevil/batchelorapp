openapi: 3.1.0
info:
  title: Ornaments
  version: 0.1.0
paths:
  /items:
    get:
      operationId: listOrnaments
      tags:
        - ornaments
      summary: List ornaments
      parameters:
        - name: q
          in: query
          required: false
          description: Text search across name, series/collection, brand, and notes
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: seriesOrCollection
          in: query
          required: false
          schema:
            type: string
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 60
      responses:
        "200":
          description: Paginated collection list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentListResponse"
    post:
      operationId: createOrnament
      tags:
        - ornaments
      summary: Add an ornament
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentItem"
        "400":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/stragglers:
    get:
      operationId: getOrnamentStragglers
      tags:
        - ornaments
      summary: List ornaments missing an embedding or core attributes
      responses:
        "200":
          description: Stragglers needing re-analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stragglers"
  /items/bulk-reanalyze:
    post:
      operationId: bulkReanalyzeOrnaments
      tags:
        - ornaments
      summary: Re-run AI analysis on multiple ornaments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReanalyzeInput"
      responses:
        "200":
          description: Bulk reanalysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReanalyzeResult"
  /items/{id}:
    get:
      operationId: getOrnament
      tags:
        - ornaments
      summary: Get an ornament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The ornament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateOrnament
      tags:
        - ornaments
      summary: Update an ornament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrnamentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteOrnament
      tags:
        - ornaments
      summary: Remove an ornament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/{id}/reanalyze:
    post:
      operationId: reanalyzeOrnament
      tags:
        - ornaments
      summary: Re-run AI analysis on an ornament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated with fresh AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/{id}/set-primary-image:
    post:
      operationId: setOrnamentPrimaryImage
      tags:
        - ornaments
      summary: Promote a supplemental image to primary and re-analyse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrimaryImageSelection"
      responses:
        "200":
          description: Updated item with new primary image and fresh AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/{id}/images:
    post:
      operationId: addOrnamentImage
      tags:
        - ornaments
      summary: Add a supplemental image to an ornament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentImage"
        "400":
          description: Invalid upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Ornament not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/{id}/images/{imageId}:
    patch:
      operationId: updateOrnamentImage
      tags:
        - ornaments
      summary: Update a supplemental image's label or position
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrnamentImageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentImage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteOrnamentImage
      tags:
        - ornaments
      summary: Remove a supplemental image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /items/{id}/barcode-lookup:
    post:
      operationId: lookupOrnamentBarcode
      tags:
        - ornaments
      summary: Look up a barcode via UPCitemdb and return candidate fields (does not save)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarcodeLookupInput"
      responses:
        "200":
          description: Lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodeLookupResult"
  /barcode-lookup:
    post:
      operationId: lookupBarcode
      tags:
        - ornaments
      summary: Look up a barcode via UPCitemdb for the add-item form (does not save)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarcodeLookupInput"
      responses:
        "200":
          description: Lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarcodeLookupResult"
  /items/{id}/book-value-lookup:
    post:
      operationId: lookupOrnamentBookValue
      tags:
        - ornaments
      summary: Look up and save the current book/insurance value from hallmarkornaments.com or hookedonhallmark.com
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated with fresh book value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrnamentItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: No book value could be found for this ornament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /series:
    get:
      operationId: listOrnamentSeries
      tags:
        - ornaments
      summary: List distinct series/collections with item counts
      responses:
        "200":
          description: Series list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeriesCount"
  /stats:
    get:
      operationId: getOrnamentStats
      tags:
        - ornaments
      summary: Collection dashboard summary (totals, book value, series breakdown)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
  /categories:
    get:
      operationId: listOrnamentCategories
      tags:
        - ornaments
      summary: List categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createOrnamentCategory
      tags:
        - ornaments
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "409":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /categories/unused:
    delete:
      operationId: deleteOrnamentUnusedCategories
      tags:
        - ornaments
      summary: Delete all categories that have no ornaments assigned
      responses:
        "200":
          description: Number of categories deleted
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                properties:
                  deleted:
                    type: integer
  /categories/{id}:
    patch:
      operationId: renameOrnamentCategory
      tags:
        - ornaments
      summary: Rename a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteOrnamentCategory
      tags:
        - ornaments
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /categories/{id}/colors:
    put:
      operationId: updateOrnamentCategoryColors
      tags:
        - ornaments
      summary: Update a category's background and text colours
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryColorInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /categories/{id}/merge:
    post:
      operationId: mergeOrnamentCategory
      tags:
        - ornaments
      summary: Merge a category into another (reassigns all ornaments, deletes source)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeCategoryInput"
      responses:
        "204":
          description: Merged and deleted
        "400":
          description: Cannot merge a category into itself
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Source or target not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string
        bgColor:
          type:
            - string
            - "null"
        textColor:
          type:
            - string
            - "null"
        count:
          type: integer
          description: Number of ornaments assigned this category (only present on the category-list endpoint)
    CategoryInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        bgColor:
          type:
            - string
            - "null"
        textColor:
          type:
            - string
            - "null"
    CategoryColorInput:
      type: object
      properties:
        bgColor:
          type:
            - string
            - "null"
        textColor:
          type:
            - string
            - "null"
    MergeCategoryInput:
      type: object
      required:
        - intoId
      properties:
        intoId:
          type: integer
    OrnamentImage:
      type: object
      required:
        - id
        - url
        - position
      properties:
        id:
          type: integer
        url:
          type: string
        label:
          type:
            - string
            - "null"
        position:
          type: integer
    PrimaryImageSelection:
      type: object
      required:
        - imageId
      properties:
        imageId:
          type: integer
    OrnamentImageUpdate:
      type: object
      properties:
        label:
          type:
            - string
            - "null"
        position:
          type: integer
    OrnamentListResponse:
      type: object
      required:
        - items
        - total
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrnamentItem"
        total:
          type: integer
          description: Total number of items matching the query (before pagination)
        page:
          type: integer
        pageSize:
          type: integer
    OrnamentItem:
      type: object
      required:
        - id
        - name
        - brand
        - quantity
        - lockedFields
        - imageUrl
        - categories
        - images
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        seriesOrCollection:
          type:
            - string
            - "null"
        year:
          type:
            - integer
            - "null"
          description: Release/edition year printed on the ornament
        barcodeValue:
          type:
            - string
            - "null"
        quantity:
          type: integer
          minimum: 1
        lockedFields:
          type: array
          items:
            type: string
        notes:
          type:
            - string
            - "null"
        dimensions:
          type:
            - string
            - "null"
        condition:
          type:
            - string
            - "null"
        origin:
          type:
            - string
            - "null"
        aiDescription:
          type:
            - string
            - "null"
        acquiredAt:
          type:
            - string
            - "null"
        dominantColors:
          type: array
          items:
            type: string
        motifs:
          type: array
          items:
            type: string
        bookValue:
          type:
            - number
            - "null"
        bookValueSource:
          type:
            - string
            - "null"
          description: "Which site the value came from: hallmarkornaments.com or hookedonhallmark.com"
        bookValueUpdatedAt:
          type:
            - string
            - "null"
          format: date-time
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        images:
          type: array
          items:
            $ref: "#/components/schemas/OrnamentImage"
        imageUrl:
          type: string
        createdAt:
          type: string
          format: date-time
    OrnamentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        brand:
          type: string
          minLength: 1
        seriesOrCollection:
          type:
            - string
            - "null"
        year:
          type:
            - integer
            - "null"
        barcodeValue:
          type:
            - string
            - "null"
        notes:
          type:
            - string
            - "null"
        acquiredAt:
          type:
            - string
            - "null"
        aiDescription:
          type:
            - string
            - "null"
        dimensions:
          type:
            - string
            - "null"
        condition:
          type:
            - string
            - "null"
        origin:
          type:
            - string
            - "null"
        quantity:
          type: integer
          minimum: 1
        lockedFields:
          type: array
          items:
            type: string
        categoryIds:
          type: array
          items:
            type: integer
        bookValue:
          type:
            - number
            - "null"
        bookValueSource:
          type:
            - string
            - "null"
    StragglerItem:
      type: object
      required:
        - id
        - reasons
      properties:
        id:
          type: integer
        reasons:
          type: array
          items:
            type: string
            enum:
              - embedding
              - attributes
    Stragglers:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StragglerItem"
    BulkReanalyzeInput:
      type: object
      required:
        - ids
      properties:
        ids:
          type: array
          items:
            type: integer
          maxItems: 20
    BulkReanalyzeResult:
      type: object
      required:
        - succeeded
        - failed
      properties:
        succeeded:
          type: array
          items:
            type: integer
        failed:
          type: array
          items:
            type: integer
    BarcodeLookupInput:
      type: object
      required:
        - barcode
      properties:
        barcode:
          type: string
          minLength: 4
          maxLength: 32
    BarcodeLookupResult:
      type: object
      required:
        - found
      properties:
        found:
          type: boolean
        name:
          type:
            - string
            - "null"
        brand:
          type:
            - string
            - "null"
        seriesOrCollection:
          type:
            - string
            - "null"
        year:
          type:
            - integer
            - "null"
        description:
          type:
            - string
            - "null"
        imageUrl:
          type:
            - string
            - "null"
    SeriesCount:
      type: object
      required:
        - seriesOrCollection
        - count
      properties:
        seriesOrCollection:
          type: string
        count:
          type: integer
    SeriesValueBreakdown:
      type: object
      required:
        - seriesOrCollection
        - count
        - totalValue
      properties:
        seriesOrCollection:
          type: string
        count:
          type: integer
        totalValue:
          type: number
    StatsResponse:
      type: object
      required:
        - totalItems
        - totalQuantity
        - totalBookValue
        - itemsWithBookValue
        - bySeriesOrCollection
      properties:
        totalItems:
          type: integer
        totalQuantity:
          type: integer
        totalBookValue:
          type: number
        itemsWithBookValue:
          type: integer
        bySeriesOrCollection:
          type: array
          items:
            $ref: "#/components/schemas/SeriesValueBreakdown"
