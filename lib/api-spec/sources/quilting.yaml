        content:
          application/json:
            schema:
              type: object
              properties:
                requirementIds:
                  type: array
                  items:
                    type: integer
                  nullable: true
      responses:
        "200":
          description: Items added
          content:
            application/json:
              schema:
                type: object
                properties:
                  added:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object

  /fabrics/{id}/identifiers:
    get:
      operationId: listFabricIdentifiers
      tags: [quilting]
      summary: List known identifiers (SKU/selvedge/barcode) for a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: List of identifiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FabricIdentifier"
    post:
      operationId: addFabricIdentifier
      tags: [quilting]
      summary: Add an identifier to a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FabricIdentifierInput"
      responses:
        "201":
          description: Created identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricIdentifier"

  /fabrics/{id}/identifiers/{identifierId}:
    delete:
      operationId: deleteFabricIdentifier
      tags: [quilting]
      summary: Delete a fabric identifier
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: identifierId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /fabrics/{id}/identity-research:
    get:
      operationId: listFabricIdentityResearch
      tags: [quilting]
      summary: List identity-research jobs for a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: List of research jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FabricIdentityResearch"
    post:
      operationId: runFabricIdentityResearch
      tags: [quilting]
      summary: Run an AI identity-research job for a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricIdentityResearch"
        "404":
          description: Fabric not found

  /fabrics/{id}/identity-research/{researchId}:
    patch:
      operationId: applyFabricIdentityResearch
      tags: [quilting]
      summary: Apply a research candidate to the fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: researchId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyFabricResearchInput"
      responses:
        "200":
          description: Updated fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"
        "404":
          description: Not found

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

    ImageIdParam:
      name: imageId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    SuggestPriceBody:
      type: object
      properties:
        itemType:
          type: string
          enum: [pattern, fabric, other]
          default: other
        designer:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        colorway:
          type: ["string", "null"]

    EtsyListing:
      type: object
      required: [title, priceUsd, currency]
      properties:
        title:
          type: string
        priceUsd:
          type: number
        currency:
          type: string
        rating:
          type: ["number", "null"]
        reviewCount:
          type: ["integer", "null"]
        seller:
          type: ["string", "null"]
        listingUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    EtsyPriceSuggestion:
      type: object
      required: [suggestionUsd, listingCount, listings]
      properties:
        suggestionUsd:
          type: number
        listingCount:
          type: integer
        listings:
          type: array
          items:
            $ref: "#/components/schemas/EtsyListing"
        cachedAt:
          type: ["string", "null"]
        searchQuery:
          type: string

    FabricsListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Fabric"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PatternsListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuiltPattern"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    QuiltsListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FinishedQuilt"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    # Shared
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
        configBootstrap:
          type: string
          enum: [pending, success, warn, error]
          description: >
            Outcome of the last app-config bootstrap run.
            "pending" = not yet run; "success" = all steps completed;
            "warn" = DB unavailable at startup (non-fatal, using hardcoded fallbacks);
            "error" = unexpected JS error, stale/missing config rows may persist.
        migrations:
          type: object
          nullable: true
          required:
            - expectedLatestVersion
            - appliedLatestVersion
            - pendingCount
            - checksumErrorCount
          properties:
            expectedLatestVersion:
              type: integer
            appliedLatestVersion:
              type: integer
              nullable: true
            pendingCount:
              type: integer
            checksumErrorCount:
              type: integer

    AuthUser:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
          nullable: true
        themePreference:
          type: string
          enum: [light, dark]
          nullable: true
        isOwner:
          type: boolean
        phoneNumber:
          type: string
          nullable: true
        phoneVerified:
          type: boolean
        birthday:
          type: string
          nullable: true
          description: "Birthday as MM-DD (e.g. 03-15 for March 15th). Year is omitted."
        slackUserId:
          type: string
          nullable: true
          description: "Slack member ID used to deliver reminder DMs and enable the Elaine Slack bot."

    UpdateAccountInput:
      type: object
      properties:
        displayName:
          type: string
          nullable: true
        themePreference:
          type: string
          enum: [light, dark]
          nullable: true
        birthday:
          type: string
          nullable: true
          description: "Birthday as MM-DD (e.g. 03-15 for March 15th). Year is omitted."
        slackUserId:
          type: string
          nullable: true
          description: "Slack member ID used to deliver reminder DMs and enable the Elaine Slack bot."

    SendPhoneCodeInput:
      type: object
      required: [phoneNumber, consent]
      properties:
        phoneNumber:
          type: string
          description: E.164 format, e.g. "+12105551234"
        consent:
          type: boolean
          description: >-
            Must be true. Explicit opt-in confirmation that the user agreed
            to receive SMS text messages (verification codes and Travels
            reminders) at this number. Required for A2P 10DLC compliance —
            requests without consent=true are rejected.

    VerifyPhoneCodeInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6

    AuthProviders:
      type: object
      required: [google]
      properties:
        google:
          type: boolean

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ResetPasswordInput:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        bgColor:
          type: string
          nullable: true
        textColor:
          type: string
          nullable: true

    CategoryWithCount:
      allOf:
        - $ref: "#/components/schemas/Category"
        - type: object
          required: [count]
          properties:
            count:
              type: integer

    EntityImage:
      type: object
      required: [id, url, position]
      properties:
        id:
          type: integer
        url:
          type: string
        label:
          type: string
          nullable: true
        position:
          type: integer

    AddImageInput:
      type: object
      required: [image]
      properties:
        image:
          type: string
          format: binary
        label:
          type: string

    UpdateImageInput:
      type: object
      properties:
        label:
          type: string
          nullable: true
        position:
          type: integer

    # Fabrics
    Fabric:
      type: object
      required:
        [
          id,
          name,
          quantity,
          quantityUnit,
          dominantColors,
          motifs,
          styleDescriptors,
          lockedFields,
          categories,
          images,
          imageUrl,
          tileImageUrl,
          hasEmbedding,
          createdAt,
        ]
      properties:
        id:
          type: integer
        name:
          type: string
        lineName:
          type: string
          nullable: true
        designer:
          type: string
          nullable: true
        manufacturer:
          type: string
          nullable: true
        colorway:
          type: string
          nullable: true
        printType:
          type: string
          nullable: true
        fiberContent:
          type: string
          nullable: true
        widthInches:
          type: number
          nullable: true
        quantity:
          type: number
        quantityUnit:
          type: string
        sku:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        aiDescription:
          type: string
          nullable: true
        dominantColors:
          type: array
          items:
            type: string
        motifs:
          type: array
          items:
            type: string
        styleDescriptors:
          type: array
          items:
            type: string
        acquiredAt:
          type: string
          nullable: true
        lockedFields:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        images:
          type: array
          items:
            $ref: "#/components/schemas/EntityImage"
        imageUrl:
          type: string
        tileImageUrl:
          type: string
          description: >-
            Flat-field-corrected, tileable crop of the fabric photo. Use this
            (not imageUrl) for SVG pattern-fill rendering — it removes the
            source photo's natural lighting/vignette falloff so tiled squares
            don't show a "puffy" embossed grid.
        hasEmbedding:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateFabricInput:
      type: object
      required: [image]
      properties:
        image:
          type: string
          format: binary
        name:
          type: string
        lineName:
          type: string
        designer:
          type: string
        manufacturer:
          type: string
        colorway:
          type: string
        printType:
          type: string
        fiberContent:
          type: string
        widthInches:
          type: string
        quantity:
          type: string
        quantityUnit:
          type: string
        sku:
          type: string
        notes:
          type: string
        acquiredAt:
          type: string
        categories:
          type: string

    UpdateFabricInput:
      type: object
      properties:
        name:
          type: string
        lineName:
          type: string
          nullable: true
        designer:
          type: string
          nullable: true
        manufacturer:
          type: string
          nullable: true
        colorway:
          type: string
          nullable: true
        printType:
          type: string
          nullable: true
        fiberContent:
          type: string
          nullable: true
        widthInches:
          type: number
          nullable: true
        quantity:
          type: number
        quantityUnit:
          type: string
        sku:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        acquiredAt:
          type: string
          nullable: true
        dominantColors:
          type: array
          items:
            type: string
        motifs:
          type: array
          items:
            type: string
        lockedFields:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string

    # Quilt Patterns
    QuiltPattern:
      type: object
      required:
        [
          id,
          name,
          dominantColors,
          lockedFields,
          categories,
          images,
          hasEmbedding,
          createdAt,
        ]
      properties:
        id:
          type: integer
        name:
          type: string
        designer:
          type: string
          nullable: true
        blockSize:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        sourceType:
          type: string
          nullable: true
        sourceReference:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        acquiredAt:
          type: string
          nullable: true
        dominantColors:
          type: array
          items:
            type: string
        lockedFields:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        images:
          type: array
          items:
            $ref: "#/components/schemas/EntityImage"
        imageUrl:
          type: string
          nullable: true
        hasEmbedding:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreatePatternInput:
      type: object
      required: [name]
      properties:
        image:
          type: string
          format: binary
        name:
          type: string
        designer:
          type: string
        blockSize:
          type: string
        difficulty:
          type: string
        sourceType:
          type: string
        sourceReference:
          type: string
        notes:
          type: string
        acquiredAt:
          type: string
        categories:
          type: string

    UpdatePatternInput:
      type: object
      properties:
        name:
          type: string
        designer:
          type: string
          nullable: true
        blockSize:
          type: string
          nullable: true
        difficulty:
          type: string
          nullable: true
        sourceType:
          type: string
          nullable: true
        sourceReference:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        acquiredAt:
          type: string
          nullable: true
        lockedFields:
          type: array
          items:
            type: string
        categories:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100

    # Finished Quilts
    QuiltFabricSummary:
      type: object
      required: [id, name, imageUrl, dominantColors]
      properties:
        id:
          type: integer
        name:
          type: string
        colorway:
          type: string
          nullable: true
        imageUrl:
          type: string
        dominantColors:
          type: array
          items:
            type: string

    FinishedQuilt:
      type: object
      required:
        [
          id,
          name,
          dominantColors,
          lockedFields,
          categories,
          images,
          imageUrl,
          linkedFabricIds,
          linkedPatternIds,
          linkedFabrics,
          createdAt,
        ]
      properties:
        id:
          type: integer
        name:
          type: string
        dateCompleted:
          type: string
          nullable: true
        sizeWidth:
          type: number
          nullable: true
        sizeHeight:
          type: number
          nullable: true
        recipient:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        dominantColors:
          type: array
          items:
            type: string
        lockedFields:
          type: array
          items:
            type: string
        completionPercentage:
          type: integer
          minimum: 0
          maximum: 100
          description: WIP completion 0–100. 0 = not started, 100 = finished.
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        images:
          type: array
          items:
            $ref: "#/components/schemas/EntityImage"
        imageUrl:
          type: string
        linkedFabricIds:
          type: array
          items:
            type: integer
        linkedPatternIds:
          type: array
          items:
            type: integer
        linkedFabrics:
          type: array
          items:
            $ref: "#/components/schemas/QuiltFabricSummary"
        createdAt:
          type: string
          format: date-time

    CreateQuiltInput:
      type: object
      required: [image, name]
      properties:
        image:
          type: string
          format: binary
        name:
          type: string
        dateCompleted:
          type: string
        sizeWidth:
          type: string
        sizeHeight:
          type: string
        recipient:
          type: string
        notes:
          type: string
        categories:
          type: string
        linkedFabricIds:
          type: string
        linkedPatternIds:
          type: string

    UpdateQuiltInput:
      type: object
      properties:
        name:
          type: string
        dateCompleted:
          type: string
          nullable: true
        sizeWidth:
          type: number
          nullable: true
        sizeHeight:
          type: number
          nullable: true
        recipient:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        lockedFields:
          type: array
          items:
            type: string
        categories:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100
        linkedFabricIds:
          type: array
          items:
            type: integer
        linkedPatternIds:
          type: array
          items:
            type: integer
        completionPercentage:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true

    # Bulk reanalyze
    BulkReanalyzeInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer
          maxItems: 50

    BulkReanalyzeResult:
      type: object
      required: [total, succeeded, failed, errors]
      properties:
        total:
          type: integer
        succeeded:
          type: array
          items:
            type: integer
        failed:
          type: array
          items:
            type: integer
        errors:
          type: array
          items:
            type: object
            required: [id, error]
            properties:
              id:
                type: integer
              error:
                type: string

    ExtractBlocksResult:
      type: object
      required: [gridSize, cells, confidence]
      properties:
        gridSize:
          type: integer
          enum: [4, 8, 12]
        cells:
          type: array
          items:
            type: string
        confidence:
          type: string
          enum: [high, medium, low]

    # Compare
    FabricMatchResult:
      type: object
      required: [fabric, similarity, samePattern, exactFabric, explanation]
      properties:
        fabric:
          $ref: "#/components/schemas/Fabric"
        similarity:
          type: number
        samePattern:
          type: string
          enum: [yes, maybe, no]
        exactFabric:
          type: string
          enum: [yes, maybe, no]
        explanation:
          type: string

    CompareResult:
      type: object
      required: [summary, ownsSamePattern, ownsExactFabric, matches]
      properties:
        summary:
          type: string
        ownsSamePattern:
          type: string
          enum: [yes, maybe, no]
        ownsExactFabric:
          type: string
          enum: [yes, maybe, no]
        matches:
          type: array
          items:
            $ref: "#/components/schemas/FabricMatchResult"

    # Palette match tools
    PaletteMatchFabricResult:
      type: object
      required: [score, matchedColors]
      properties:
        fabric:
          $ref: "#/components/schemas/Fabric"
        score:
          type: number
        matchedColors:
          type: array
          items:
            type: string

    PaletteMatchFabricResponse:
      type: object
      required: [extractedColors, matches]
      properties:
        extractedColors:
          type: array
          items:
            type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/PaletteMatchFabricResult"

    PaletteMatchPatternResult:
      type: object
      required: [score, matchedColors]
      properties:
        pattern:
          $ref: "#/components/schemas/QuiltPattern"
        score:
          type: number
        matchedColors:
          type: array
          items:
            type: string

    PaletteMatchPatternResponse:
      type: object
      required: [extractedColors, matches]
      properties:
        extractedColors:
          type: array
          items:
            type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/PaletteMatchPatternResult"

    PaletteMatchQuiltResult:
      type: object
      required: [score, matchedColors]
      properties:
        quilt:
          $ref: "#/components/schemas/FinishedQuilt"
        score:
          type: number
        matchedColors:
          type: array
          items:
            type: string

    PaletteMatchQuiltResponse:
      type: object
      required: [extractedColors, matches]
      properties:
        extractedColors:
          type: array
          items:
            type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/PaletteMatchQuiltResult"

    # Categories
    CreateCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        bgColor:
          type: string
          nullable: true
        textColor:
          type: string
          nullable: true

    RenameCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateCategoryColorsInput:
      type: object
      properties:
        bgColor:
          type: string
          nullable: true
        textColor:
          type: string
          nullable: true

    MergeCategoryInput:
      type: object
      required: [targetId]
      properties:
        targetId:
          type: integer

    # Stats
    CollectionStats:
      type: object
      required:
        [
          totalFabrics,
          totalPatterns,
          totalQuilts,
          totalBlocks,
          totalLayouts,
          totalYardage,
          topColors,
          topMotifs,
          topPrintTypes,
        ]
      properties:
        totalFabrics:
          type: integer
        totalPatterns:
          type: integer
        totalQuilts:
          type: integer
        totalBlocks:
          type: integer
        totalLayouts:
          type: integer
        totalYardage:
          type: number
        topColors:
          type: array
          items:
            type: object
            required: [color, count]
            properties:
              color:
                type: string
              count:
                type: integer
        topMotifs:
          type: array
          items:
            type: object
            required: [motif, count]
            properties:
              motif:
                type: string
              count:
                type: integer
        topPrintTypes:
          type: array
          items:
            type: object
            required: [printType, count]
            properties:
              printType:
                type: string
              count:
                type: integer

    StaleCount:
      type: object
      required: [count, fabrics, patterns]
      properties:
        count:
          type: integer
        fabrics:
          type: integer
        patterns:
          type: integer

    # Shopping list
    ShoppingItem:
      type: object
      required: [id, name, status, priority, createdAt]
      properties:
        id:
          type: integer
        name:
