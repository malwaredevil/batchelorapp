openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Batchelor Quilting App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: fabrics
    description: Fabric collection operations
  - name: patterns
    description: Quilt pattern operations
  - name: quilts
    description: Finished quilt operations
  - name: compare
    description: Fabric comparison operations
  - name: categories
    description: Category / tag management
  - name: stats
    description: Collection statistics
  - name: blocks
    description: Block pattern designer
  - name: layouts
    description: Quilt layout composer
  - name: shopping
    description: Shopping list and budget tracker

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
    patch:
      operationId: updateCurrentUser
      tags: [auth]
      summary: Update the current user's account settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated

  /auth/providers:
    get:
      operationId: getAuthProviders
      tags: [auth]
      summary: Get available login providers
      responses:
        "200":
          description: Available providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthProviders"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "204":
          description: >
            Reset email sent (or silently accepted when email is not registered,
            to avoid account enumeration)
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Email service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Consume a reset token and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "204":
          description: Password updated
        "400":
          description: Token invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/phone/send-code:
    post:
      operationId: sendPhoneVerificationCode
      tags: [auth]
      summary: Send a one-time SMS verification code to a candidate phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPhoneCodeInput"
      responses:
        "204":
          description: Code sent
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated

  /auth/phone/verify:
    post:
      operationId: verifyPhoneCode
      tags: [auth]
      summary: Verify a one-time code and commit the phone number to the account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneCodeInput"
      responses:
        "200":
          description: Phone number verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated

  /auth/test-sms:
    post:
      operationId: sendTestSms
      tags: [auth]
      summary: Send a test SMS to the current user's own verified phone number
      responses:
        "204":
          description: Test SMS sent
        "400":
          description: No verified phone number on file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated

  /auth/test-email:
    post:
      operationId: sendTestEmail
      tags: [auth]
      summary: Send a test email to the current user's own account email
      responses:
        "204":
          description: Test email sent
        "401":
          description: Not authenticated
        "503":
          description: Email service not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "204":
          description: Password changed
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Current password incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Fabrics
  # ---------------------------------------------------------------------------

  /fabrics:
    get:
      operationId: listFabrics
      tags: [fabrics]
      summary: List all fabrics
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Fabric list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FabricsListResponse"

    post:
      operationId: createFabric
      tags: [fabrics]
      summary: Add a fabric (with primary photo)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateFabricInput"
      responses:
        "201":
          description: Fabric created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /fabrics/{id}:
    get:
      operationId: getFabric
      tags: [fabrics]
      summary: Get a fabric by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Fabric detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      operationId: updateFabric
      tags: [fabrics]
      summary: Update fabric metadata
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFabricInput"
      responses:
        "200":
          description: Updated fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deleteFabric
      tags: [fabrics]
      summary: Delete a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /fabrics/{id}/image:
    get:
      operationId: getFabricImage
      tags: [fabrics]
      summary: Get primary fabric image (proxied, authenticated)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Image binary

  /fabrics/{id}/reanalyze:
    post:
      operationId: reanalyzeFabric
      tags: [fabrics]
      summary: Re-run AI analysis on a fabric using its existing photos
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated fabric
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"

  /fabrics/{id}/pairings:
    get:
      operationId: getFabricPairings
      tags: [fabrics]
      summary: Get up to 4 stash fabrics that pair well with this one (embedding similarity)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Array of pairing suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fabric"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /fabrics/used-ids:
    get:
      operationId: getUsedFabricIds
      tags: [fabrics]
      summary: Get IDs of fabrics linked to at least one finished quilt
      responses:
        "200":
          description: Array of used fabric IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /fabrics/bulk-reanalyze:
    post:
      operationId: bulkReanalyzeFabrics
      tags: [fabrics]
      summary: Re-run AI analysis on multiple fabrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReanalyzeInput"
      responses:
        "200":
          description: Bulk reanalysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReanalyzeResult"

  /fabrics/{id}/images:
    post:
      operationId: addFabricImage
      tags: [fabrics]
      summary: Add a supplemental image to a fabric
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddImageInput"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityImage"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /fabrics/{id}/images/{imageId}:
    get:
      operationId: getFabricSupplementalImage
      tags: [fabrics]
      summary: Get a supplemental fabric image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "200":
          description: Image binary

    patch:
      operationId: updateFabricImage
      tags: [fabrics]
      summary: Update a supplemental fabric image label/position
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateImageInput"
      responses:
        "200":
          description: Updated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityImage"

    delete:
      operationId: deleteFabricImage
      tags: [fabrics]
      summary: Delete a supplemental fabric image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "204":
          description: Deleted

  /fabrics/{id}/images/{imageId}/set-default:
    post:
      operationId: setFabricImageDefault
      tags: [fabrics]
      summary: Set a supplemental image as the fabric's default photo
      description: >-
        Swaps the supplemental image with the current primary photo so all
        imageUrl / tileImageUrl calls immediately serve the new default.
        The old primary photo becomes a supplemental image and retains its
        position in the gallery.
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "200":
          description: Updated fabric with new default photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fabric"
        "404":
          description: Fabric or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Quilt Patterns
  # ---------------------------------------------------------------------------

  /patterns:
    get:
      operationId: listPatterns
      tags: [patterns]
      summary: List all quilt patterns
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Pattern list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternsListResponse"

    post:
      operationId: createPattern
      tags: [patterns]
      summary: Add a quilt pattern
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreatePatternInput"
      responses:
        "201":
          description: Pattern created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltPattern"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /patterns/{id}:
    get:
      operationId: getPattern
      tags: [patterns]
      summary: Get a quilt pattern by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Pattern detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltPattern"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      operationId: updatePattern
      tags: [patterns]
      summary: Update pattern metadata
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePatternInput"
      responses:
        "200":
          description: Updated pattern
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltPattern"

    delete:
      operationId: deletePattern
      tags: [patterns]
      summary: Delete a pattern
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /patterns/{id}/image:
    get:
      operationId: getPatternImage
      tags: [patterns]
      summary: Get primary pattern image
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Image binary

  /patterns/{id}/reanalyze:
    post:
      operationId: reanalyzePattern
      tags: [patterns]
      summary: Re-run AI analysis on a pattern using its existing photo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated pattern
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltPattern"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /patterns/{id}/enrich:
    post:
      operationId: enrichPattern
      tags: [patterns]
      summary: Enrich designer metadata via AI web search (Perplexity)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated pattern with enriched designer info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltPattern"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /patterns/{id}/extract-blocks:
    post:
      operationId: extractPatternBlocks
      tags: [patterns]
      summary: Extract block grid schema from pattern image via AI
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Extracted block schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractBlocksResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Pattern has no image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /patterns/bulk-reanalyze:
    post:
      operationId: bulkReanalyzePatterns
      tags: [patterns]
      summary: Re-run AI analysis on multiple patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReanalyzeInput"
      responses:
        "200":
          description: Bulk reanalysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReanalyzeResult"

  /patterns/{id}/images:
    post:
      operationId: addPatternImage
      tags: [patterns]
      summary: Add a supplemental image to a pattern
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddImageInput"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityImage"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /patterns/{id}/images/{imageId}:
    get:
      operationId: getPatternSupplementalImage
      tags: [patterns]
      summary: Get a supplemental pattern image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "200":
          description: Image binary

    patch:
      operationId: updatePatternImage
      tags: [patterns]
      summary: Update a supplemental pattern image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateImageInput"
      responses:
        "200":
          description: Updated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityImage"

    delete:
      operationId: deletePatternImage
      tags: [patterns]
      summary: Delete a supplemental pattern image
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - $ref: "#/components/parameters/ImageIdParam"
      responses:
        "204":
          description: Deleted

  # ---------------------------------------------------------------------------
  # Finished Quilts
  # ---------------------------------------------------------------------------

  /quilts:
    get:
      operationId: listQuilts
      tags: [quilts]
      summary: List all finished quilts
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        "200":
          description: Quilt list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuiltsListResponse"

    post:
      operationId: createQuilt
      tags: [quilts]
      summary: Add a finished quilt
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateQuiltInput"
      responses:
        "201":
          description: Quilt created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedQuilt"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /quilts/{id}:
    get:
      operationId: getQuilt
      tags: [quilts]
      summary: Get a finished quilt by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Quilt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedQuilt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      operationId: updateQuilt
      tags: [quilts]
      summary: Update quilt metadata
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuiltInput"
      responses:
        "200":
          description: Updated quilt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedQuilt"

    delete:
      operationId: deleteQuilt
      tags: [quilts]
      summary: Delete a finished quilt
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /quilts/{id}/image:
    get:
      operationId: getQuiltImage
      tags: [quilts]
      summary: Get primary quilt image
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Image binary

  /quilts/{id}/reanalyze:
    post:
      operationId: reanalyzeQuilt
      tags: [quilts]
      summary: Re-run AI analysis on a quilt using its existing photo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated quilt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinishedQuilt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /quilts/bulk-reanalyze:
    post:
      operationId: bulkReanalyzeQuilts
      tags: [quilts]
      summary: Re-run AI analysis on multiple quilts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkReanalyzeInput"
      responses:
        "200":
          description: Bulk reanalysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReanalyzeResult"

  /quilts/{id}/images:
    post:
      operationId: addQuiltImage
      tags: [quilts]
      summary: Add a supplemental image to a quilt
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AddImageInput"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityImage"
        "413":
          description: File too large
