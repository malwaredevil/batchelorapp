openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Travels module API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: travels
    description: Travel planning operations
paths:
  /trips:
    get:
      operationId: listTrips
      tags: [travels]
      summary: List all trips for the current user
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTripsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createTrip
      tags: [travels]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripBody"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [travels]
      summary: Get a trip by ID
      parameters:
        - $ref: "#/components/parameters/TripId"
      responses:
        "200":
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateTrip
      tags: [travels]
      summary: Update a trip
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripBody"
      responses:
        "200":
          description: Trip updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteTrip
      tags: [travels]
      summary: Delete a trip
      parameters:
        - $ref: "#/components/parameters/TripId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/itinerary:
    post:
      operationId: generateItinerary
      tags: [travels]
      summary: Generate or regenerate AI itinerary for a trip
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateItineraryBody"
      responses:
        "200":
          description: Itinerary generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/documents:
    get:
      operationId: listTripDocuments
      tags: [travels]
      summary: List documents for a trip
      parameters:
        - $ref: "#/components/parameters/TripId"
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDocumentsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: uploadTripDocument
      tags: [travels]
      summary: Upload a travel document (PDF or image) with OCR extraction
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
      responses:
        "201":
          description: Document uploaded and OCR extracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDocument"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/documents/{docId}:
    patch:
      operationId: updateTripDocument
      tags: [travels]
      summary: Correct/update the extracted data for a trip document
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/DocId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                extractedData:
                  type: object
                  additionalProperties: true
                lockedFields:
                  type: array
                  items:
                    type: string
                title:
                  type: string
                  nullable: true
                documentType:
                  type: string
                  nullable: true
                iconOverride:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDocument"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteTripDocument
      tags: [travels]
      summary: Delete a trip document
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/DocId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/documents/{docId}/rescan:
    post:
      operationId: rescanTripDocument
      tags: [travels]
      summary: Re-run AI extraction on a previously uploaded document, respecting locked fields
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document re-scanned and updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDocument"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: AI re-analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/documents/{docId}/download:
    get:
      operationId: downloadTripDocument
      tags: [travels]
      summary: Download/view a trip document
      parameters:
        - $ref: "#/components/parameters/TripId"
        - $ref: "#/components/parameters/DocId"
      responses:
        "200":
          description: Document file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /documents/unmatched:
    get:
      operationId: listUnmatchedDocuments
      tags: [travels]
      summary: List documents from forwarded emails that couldn't be auto-matched to a trip
      responses:
        "200":
          description: List of unmatched documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDocumentsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /documents/unmatched/count:
    get:
      operationId: getUnmatchedDocumentsCount
      tags: [travels]
      summary: Count of unmatched documents (for a badge indicator)
      responses:
        "200":
          description: Count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /documents/{docId}/assign:
    patch:
      operationId: assignUnmatchedDocument
      tags: [travels]
      summary: Assign an unmatched document to a trip
      parameters:
        - $ref: "#/components/parameters/DocId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId]
              properties:
                tripId:
                  type: integer
      responses:
        "200":
          description: Document assigned and linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDocument"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /documents/{docId}:
    delete:
      operationId: deleteUnmatchedDocument
      tags: [travels]
      summary: Discard an unmatched document
      parameters:
        - $ref: "#/components/parameters/DocId"
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /gmail/messages/{messageId}:
    get:
      operationId: getGmailMessage
      tags: [travels]
      summary: Get the full content and attachment metadata for a Gmail message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Parsed message content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GmailMessageDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Gmail is not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Could not load message from Gmail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /explore:
    post:
      operationId: exploreDestination
      tags: [travels]
      summary: Get a map location and AI overview for a destination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExploreDestinationBody"
      responses:
        "200":
          description: Destination overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExploreDestinationResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stats:
    get:
      operationId: getTravelsStats
      tags: [travels]
      summary: Get travel statistics for the current user
      responses:
        "200":
          description: Travel statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelsStatsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/packing:
    get:
      operationId: getPackingList
      tags: [travels]
      summary: Get (or auto-create) the packing list and items for a trip
      parameters:
        - $ref: "#/components/parameters/TripId"
      responses:
        "200":
          description: Packing list with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingListWithItems"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/packing/items:
    post:
      operationId: createPackingItem
      tags: [travels]
      summary: Add an item to a trip's packing list
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackingItemBody"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingItem"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/packing/items/reorder:
    post:
      operationId: reorderPackingItems
      tags: [travels]
      summary: Batch-update sort order for packing items (drag-and-drop reorder)
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPackingItemsBody"
      responses:
        "200":
          description: Reorder applied
          content:
            application/json:
              schema:
                type: object
                required: [reordered]
                properties:
                  reordered:
                    type: integer
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/packing/items/bulk:
    post:
      operationId: bulkCreatePackingItems
      tags: [travels]
      summary: Add multiple items to a trip's packing list
      parameters:
        - $ref: "#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreatePackingItemsBody"
      responses:
        "201":
          description: Items created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PackingItem"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/packing/items/{itemId}:
    patch:
      operationId: updatePackingItem
      tags: [travels]
      summary: Update a packing item (toggle packed, rename, reorder)
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePackingItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePackingItem
      tags: [travels]
      summary: Remove a packing item
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /trips/{id}/packing/load-template/{templateId}:
    post:
      operationId: loadPackingTemplate
      tags: [travels]
      summary: Merge a template's items into the trip's packing list
      parameters:
        - $ref: "#/components/parameters/TripId"
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Items added from template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoadTemplateResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /packing-templates:
    get:
      operationId: listPackingTemplates
      tags: [travels]
      summary: List all saved packing templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PackingTemplate"
    post:
      operationId: createPackingTemplate
      tags: [travels]
      summary: Save a new packing template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackingTemplateBody"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackingTemplate"

  /packing-templates/{templateId}:
    delete:
      operationId: deletePackingTemplate
      tags: [travels]
      summary: Delete a packing template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    TripId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    DocId:
      name: docId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Trip:
      type: object
      required:
        - id
        - userId
        - title
        - destination
        - status
        - travellerCount
        - hasRentalCar
        - createdAt
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        destination:
          type: string
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
        status:
          type: string
          enum: [wishlist, planning, booked, active, completed]
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        transportTo:
          type: string
          enum: [drove, flew, train]
          nullable: true
        transportDetails:
          type: string
          nullable: true
        hasRentalCar:
          type: boolean
        accommodationName:
          type: string
          nullable: true
        accommodationArea:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        funFact:
          type: string
          nullable: true
        travellerCount:
          type: integer
        travelers:
          type: array
          items:
            type: string
          nullable: true
        theOneThing:
          type: array
          items:
            type: string
          nullable: true
        iconPhotoId:
          type: integer
          nullable: true
        shareToken:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    TripDetail:
      allOf:
        - $ref: "#/components/schemas/Trip"
        - type: object
          properties:
            itinerary:
              nullable: true
            packingList:
              nullable: true
            todoList:
              nullable: true
            documents:
              type: array
              items:
                $ref: "#/components/schemas/TripDocument"

    CreateTripBody:
      type: object
      required: [title, destination, status]
      properties:
        title:
          type: string
        destination:
          type: string
        lat:
          type: number
        lng:
          type: number
        status:
          type: string
          enum: [wishlist, planning, booked, active, completed]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        transportTo:
          type: string
          enum: [drove, flew, train]
        transportDetails:
          type: string
        hasRentalCar:
          type: boolean
        accommodationName:
          type: string
        accommodationArea:
          type: string
        notes:
          type: string
        funFact:
          type: string
        travellerCount:
          type: integer
        travelers:
          type: array
          items:
            type: string
        theOneThing:
          type: array
          items:
            type: string

    UpdateTripBody:
      type: object
      properties:
        title:
          type: string
        destination:
          type: string
        lat:
          type: number
        lng:
          type: number
        status:
          type: string
          enum: [wishlist, planning, booked, active, completed]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        transportTo:
          type: string
          enum: [drove, flew, train]
        transportDetails:
          type: string
        hasRentalCar:
          type: boolean
        accommodationName:
          type: string
        accommodationArea:
          type: string
        notes:
          type: string
        funFact:
          type: string
        travellerCount:
          type: integer
        travelers:
          type: array
          items:
            type: string
        theOneThing:
          type: array
          items:
            type: string
        itinerary:
          nullable: true
        packingList:
          nullable: true
        todoList:
          nullable: true

    ListTripsResponse:
      type: array
      items:
        $ref: "#/components/schemas/Trip"

    GenerateItineraryBody:
      type: object
      required: [style, interests]
      properties:
        style:
          type: string
          enum: [relaxed, balanced, packed]
        interests:
          type: array
          items:
            type: string
        regenerateDay:
          type: integer
          nullable: true
          description: If set, regenerate only this day index (0-based)

    ItineraryResult:
      type: object
      required: [itinerary]
      properties:
        itinerary:
          type: object

    TripDocument:
      type: object
      required: [id, userId, storagePath, createdAt]
      properties:
        id:
          type: integer
        tripId:
          type: integer
          nullable: true
        userId:
          type: integer
        storagePath:
          type: string
        title:
          type: string
          nullable: true
        documentType:
          type: string
          nullable: true
        originalFilename:
          type: string
          nullable: true
        extractedData:
          type: object
          additionalProperties: true
          nullable: true
        lockedFields:
          type: array
          items:
            type: string
        gmailMessageId:
          type: string
          nullable: true
        iconOverride:
          type: string
          nullable: true
        status:
          type: string
          enum: [linked, unmatched]
        source:
          type: string
          enum: [upload, email_forward]
        sourceEmailFrom:
          type: string
          nullable: true
        sourceEmailSubject:
          type: string
          nullable: true
        sourceReceivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    ListDocumentsResponse:
      type: array
      items:
        $ref: "#/components/schemas/TripDocument"

    ExploreDestinationBody:
      type: object
      required: [destination]
      properties:
        destination:
          type: string

    ExploreDestinationResult:
      type: object
      required: [destination, lat, lng, overview]
      properties:
        destination:
          type: string
        lat:
          type: number
        lng:
          type: number
        overview:
          type: object

    TravelsStatsResponse:
      type: object
      required:
        [
          totalTrips,
          completedTrips,
          upcomingTrips,
          uniqueDestinations,
          nextTrip,
        ]
      properties:
        totalTrips:
